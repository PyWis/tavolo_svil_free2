<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Tavoli — Stampa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; background: #fff; padding: 1rem; }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 12px;
        }
        .toolbar button, .toolbar a {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Lato', sans-serif;
        }
        .btn-print { background: #e66b1d; color: #fff; }
        .btn-print:hover { background: #c4591a; }
        .btn-back { background: #e0e0e0; color: #424242; }
        .btn-back:hover { background: #bdbdbd; }

        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .qr-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            page-break-inside: avoid;
        }
        .qr-card img { display: block; margin: 0 auto 0.75rem; }
        .qr-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #e66b1d;
        }
        .qr-name {
            font-size: 0.85rem;
            color: #757575;
            margin-top: 0.25rem;
        }
        .qr-url {
            font-size: 0.7rem;
            color: #9e9e9e;
            margin-top: 0.5rem;
            word-break: break-all;
        }

        @media print {
            .toolbar { display: none; }
            body { padding: 0; }
            .qr-grid { gap: 1rem; }
            .qr-card { border-color: #ccc; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="btn-print" onclick="window.print()">Stampa QR Codes</button>
        <a href="{{ url_for('tables_list') }}" class="btn-back">Torna ai Tavoli</a>
        <span style="color:#757575; font-size:0.85rem;">{{ tables|length }} tavoli attivi</span>
    </div>

    {% if tables %}
    <div class="qr-grid">
        {% for t in tables %}
        <div class="qr-card">
            <img src="{{ url_for('table_qr', tid=t.id) }}" alt="QR Tavolo {{ t.number }}" width="180" height="180">
            <div class="qr-label">Tavolo {{ t.number }}</div>
            {% if t.name %}
                <div class="qr-name">{{ t.name }}</div>
            {% endif %}
            <div class="qr-url">{{ base_url }}/tavolo/{{ t.number }}</div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p style="text-align:center; color:#757575; padding:3rem;">Nessun tavolo attivo.</p>
    {% endif %}
</body>
</html>

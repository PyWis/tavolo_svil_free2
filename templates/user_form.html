{% extends "base.html" %}
{% block title %}Nuovo Utente{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Crea Nuovo Utente</h1>
</div>

<div class="card" style="max-width:550px;">
    <div class="card-header">Dati Utente</div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Scegli un username" maxlength="64" pattern="[A-Za-z0-9._-]+">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Minimo 10 caratteri, con lettere, numeri e simboli" minlength="10">
            </div>
            <p class="text-sm text-muted">L'utente verrà creato con ruolo <strong>user</strong>.</p>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Crea Utente</button>
                <a href="{{ url_for('users_list') }}" class="btn btn-secondary">Annulla</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
